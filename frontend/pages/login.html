<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Crop Yield Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/main.css">
    <!-- Production: replace the empty string with your Render URL -->
    <script>window.APP_CONFIG = { apiUrl: '' };</script>
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #ffffff;
        }

        .login-box {
            background: linear-gradient(135deg, rgba(27, 67, 50, 0.95), rgba(45, 106, 79, 0.9));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(82, 183, 136, 0.3);
            border-radius: 25px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.5s ease-out;
            color: #ffffff; /* White text for contrast on dark green box */
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header .logo {
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.8);
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem 0;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
            font-size: 1rem;
            font-family: inherit;
        }

        .tab-btn.active {
            color: #ffffff;
            border-bottom-color: #52B788;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .login-box .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 500;
            color: #ffffff;
            font-size: 0.95rem;
        }

        .login-box .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
        }

        .login-box .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }

        .login-box .form-group input:focus {
            outline: none;
            border-color: #52B788 !important;
            background: rgba(255, 255, 255, 0.15) !important;
            color: #ffffff !important;
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.25) !important;
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-green);
            color: var(--dark);
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            background: var(--light-green);
            transform: translateY(-2px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert {
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.95rem;
            animation: slideDown 0.3s ease-out;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: rgba(82, 183, 136, 0.2);
            color: #1B5E20;
            border-left: 4px solid var(--accent-green);
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            color: #B71C1C;
            border-left: 4px solid #F44336;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .back-link a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        body {
            background: #ffffff;
            color: #333;
        }

        .back-link a:hover {
            color: var(--primary-green);
        }

        .performance-card {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 6px;
        }

        .performance-card:hover::after {
            content: attr(title);
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 5px;
            border-radius: 5px;
            font-size: 10px;
        }

        .stat-card-title {
            font-weight: 600;
            font-size: 18px;
        }

        .stat-card-description {
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            margin-top: 6px;
            line-height: 1.4;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .card-content {
            text-align: left;
            padding: 20px;
        }
    </style>

    <script>
        // If already logged in, skip login page
        if (localStorage.getItem('currentUser')) {
            window.location.replace('dashboard.html');
        }
    </script>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <span class="logo-icon">🌾</span>
                <span class="brand">Crop Yield Pro</span>
            </div>

            <div class="nav-right">
                <div class="profile" id="userGreeting" style="display: none;">
                    <span class="avatar" id="userAvatar">A</span>
                    <span id="userName">aditya</span>
                </div>

                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="index.html#features">Features</a>
                    <a href="index.html#how-it-works">How It Works</a>
                </div>

                <a href="login.html" class="btn-dashboard" id="auth-btn">Login</a>
                <a href="#" class="btn-logout" id="logout-btn" style="display: none;" onclick="logout()">Logout</a>
            </div>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="logo" style="margin-bottom: 1rem; font-size: 3rem;">🌾</div>
                <h1>Crop Yield Pro</h1>
                <p>AI-Powered Farming Solutions</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <!-- LOGIN FORM -->
            <div id="login" class="form-section active">
                <div id="login-alert" class="alert"></div>
                <form id="loginForm" autocomplete="off" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="user_email" autocomplete="new-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="user_password" autocomplete="new-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="login-btn" id="loginBtn">
                        <span>Sign In</span>
                    </button>
                </form>
            </div>

            <!-- SIGNUP FORM -->
            <div id="signup" class="form-section">
                <div id="signup-alert" class="alert"></div>
                <form id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm">Confirm Password</label>
                        <input type="password" id="signup-confirm" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="login-btn" id="signupBtn">
                        <span>Create Account</span>
                    </button>
                </form>
            </div>

            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
