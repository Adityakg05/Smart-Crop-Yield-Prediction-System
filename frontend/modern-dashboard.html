<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Crop Yield Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modern.css">
    <style>
        .dashboard-container {
            min-height: 100vh;
            padding: 2rem 0;
            background: linear-gradient(135deg, #1a472a 0%, #2d5016 50%, #1f4620 100%);
        }

        .dashboard-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(82, 183, 136, 0.2);
            padding: 2rem 0;
            margin-bottom: 3rem;
            box-shadow: var(--shadow);
        }

        .dashboard-header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-greeting {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-green);
        }

        .logout-btn {
            background: #F44336;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .logout-btn:hover {
            background: #D32F2F;
            transform: translateY(-2px);
        }

        .dashboard-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .prediction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 968px) {
            .prediction-grid {
                grid-template-columns: 1fr;
            }
        }

        .prediction-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(82, 183, 136, 0.2);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
        }

        .prediction-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-green);
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: var(--primary-green);
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid rgba(82, 183, 136, 0.2);
            border-radius: 10px;
            font-size: 0.95rem;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.7);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-green);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .predict-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--accent-green);
            color: var(--dark);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
        }

        .predict-btn:hover {
            background: var(--light-green);
            transform: translateY(-2px);
        }

        .predict-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
            animation: slideUp 0.5s ease-out;
        }

        .result-card {
            background: linear-gradient(135deg, var(--accent-green) 0%, #2E7D32 100%);
            border-radius: 20px;
            padding: 3rem;
            color: var(--white);
            text-align: center;
            box-shadow: 0 20px 60px rgba(82, 183, 136, 0.3);
        }

        .result-label {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .result-value {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 800;
            margin: 1rem 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .result-unit {
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 2rem;
        }

        .detail-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .detail-label {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .detail-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .alert {
            padding: 1rem 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: rgba(244, 67, 54, 0.2);
            color: #B71C1C;
            border-left: 4px solid #F44336;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--white);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        .crops-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .crop-option {
            padding: 0.8rem;
            background: rgba(82, 183, 136, 0.1);
            border: 2px solid rgba(82, 183, 136, 0.3);
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            font-weight: 500;
        }

        .crop-option:hover {
            background: rgba(82, 183, 136, 0.2);
            border-color: var(--accent-green);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <div class="dashboard-header-content">
                <div class="user-greeting">
                    👋 Welcome, <span id="userName">Farmer</span>!
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="dashboard-content">
            <div class="prediction-grid">
                <!-- Prediction Form -->
                <div class="prediction-card">
                    <h2>🌾 Predict Yield</h2>
                    <div id="alert" class="alert"></div>
                    
                    <form id="predictionForm" onsubmit="handlePrediction(event)">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Rainfall (mm)</label>
                                <input type="number" id="rainfall" min="0" max="3000" step="0.1" placeholder="e.g., 800" required>
                            </div>
                            <div class="form-group">
                                <label>Temperature (°C)</label>
                                <input type="number" id="temperature" min="0" max="50" step="0.1" placeholder="e.g., 25" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Humidity (%)</label>
                                <input type="number" id="humidity" min="0" max="100" step="0.1" placeholder="e.g., 60" required>
                            </div>
                            <div class="form-group">
                                <label>Area (hectares)</label>
                                <input type="number" id="area" min="0.1" max="1000" step="0.1" placeholder="e.g., 10" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Nitrogen (kg/ha)</label>
                                <input type="number" id="N" min="0" max="500" step="0.1" placeholder="e.g., 50" required>
                            </div>
                            <div class="form-group">
                                <label>Phosphorus (kg/ha)</label>
                                <input type="number" id="P" min="0" max="500" step="0.1" placeholder="e.g., 40" required>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Potassium (kg/ha)</label>
                                <input type="number" id="K" min="0" max="500" step="0.1" placeholder="e.g., 30" required>
                            </div>
                            <div class="form-group">
                                <label for="state">State</label>
                                <select id="state" required>
                                    <option value="">Select State</option>
                                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                                    <option value="Rajasthan">Rajasthan</option>
                                    <option value="Maharashtra">Maharashtra</option>
                                    <option value="Karnataka">Karnataka</option>
                                    <option value="Gujarat">Gujarat</option>
                                    <option value="Orissa">Orissa</option>
                                    <option value="West Bengal">West Bengal</option>
                                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                                    <option value="Bihar">Bihar</option>
                                    <option value="Telangana">Telangana</option>
                                    <option value="Tamil Nadu">Tamil Nadu</option>
                                    <option value="Assam">Assam</option>
                                    <option value="Punjab">Punjab</option>
                                    <option value="Chhattisgarh">Chhattisgarh</option>
                                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                                    <option value="Uttarakhand">Uttarakhand</option>
                                    <option value="Haryana">Haryana</option>
                                    <option value="Jharkhand">Jharkhand</option>
                                    <option value="Kerala">Kerala</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="crop">Crop Type</label>
                            <select id="crop" required>
                                <option value="">Select Crop</option>
                                <option value="Rice">🍚 Rice</option>
                                <option value="Wheat">🌾 Wheat</option>
                                <option value="Maize">🌽 Maize</option>
                                <option value="Cotton">🪡 Cotton</option>
                                <option value="Sugarcane">🌾 Sugarcane</option>
                                <option value="Soybean">🫘 Soybean</option>
                                <option value="Chickpea">Chickpea</option>
                                <option value="Gram">Gram</option>
                                <option value="Pigeon Pea">Pigeon Pea</option>
                                <option value="Lentil">Lentil</option>
                                <option value="Barley">Barley</option>
                                <option value="Jowar">Jowar</option>
                                <option value="Bajra">Bajra</option>
                                <option value="Ragi">Ragi</option>
                                <option value="Groundnut">🥜 Groundnut</option>
                                <option value="Sunflower">🌻 Sunflower</option>
                                <option value="Sorghum">Sorghum</option>
                                <option value="Mustard">Mustard</option>
                                <option value="Coconut">🥥 Coconut</option>
                                <option value="Tobacco">Tobacco</option>
                                <option value="Tea">Tea</option>
                                <option value="Coffee">☕ Coffee</option>
                            </select>
                        </div>

                        <button type="submit" class="predict-btn" id="predictBtn">
                            <span>Get Prediction</span>
                        </button>
                    </form>
                </div>

                <!-- Results Section -->
                <div class="result-section" id="resultSection">
                    <div class="result-card">
                        <div class="result-label">Predicted Crop Yield</div>
                        <div class="result-value" id="resultValue">0</div>
                        <div class="result-unit">Tonnes/Hectare</div>
                        
                        <div class="result-details">
                            <div class="detail-item">
                                <div class="detail-label">Confidence Score</div>
                                <div class="detail-value" id="confidence">--</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Total Predicted Yield</div>
                                <div class="detail-value" id="totalYield">--</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (!localStorage.getItem('currentUser')) {
            window.location.href = 'modern-login.html';
        }

        // Load user name
        const user = JSON.parse(localStorage.getItem('currentUser'));
        document.getElementById('userName').textContent = user.name || 'Farmer';

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert show alert-${type}`;
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        async function handlePrediction(event) {
            event.preventDefault();

            const data = {
                rainfall: parseFloat(document.getElementById('rainfall').value),
                temperature: parseFloat(document.getElementById('temperature').value),
                humidity: parseFloat(document.getElementById('humidity').value),
                N: parseFloat(document.getElementById('N').value),
                P: parseFloat(document.getElementById('P').value),
                K: parseFloat(document.getElementById('K').value),
                area: parseFloat(document.getElementById('area').value),
                state: document.getElementById('state').value,
                crop: document.getElementById('crop').value
            };

            const btn = document.getElementById('predictBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Predicting...';

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('Prediction failed');
                }

                const result = await response.json();
                
                // Display results
                document.getElementById('resultValue').textContent = result.predicted_yield.toFixed(2);
                document.getElementById('confidence').textContent = (result.confidence_score * 100).toFixed(1) + '%';
                document.getElementById('totalYield').textContent = (result.predicted_yield * data.area).toFixed(2) + ' T';
                
                document.getElementById('resultSection').classList.add('show');
                showAlert('✓ Prediction completed successfully!', 'success');

            } catch (error) {
                showAlert('✗ Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>Get Prediction</span>';
            }
        }
    </script>
</body>
</html>
