services:
  - type: web
    name: crop-yield-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true      # Render auto-generates a secure random value
      - key: PYTHON_VERSION
        value: 3.11.0
